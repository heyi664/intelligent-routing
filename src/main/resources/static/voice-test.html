<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>实时语音测试</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d9dee8;
      --primary: #1f6feb;
      --primary-dark: #1557bd;
      --danger: #c7362f;
      --ok: #17803d;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { width: min(1040px, calc(100% - 32px)); margin: 0 auto; padding: 32px 0; }
    h1 { margin: 0 0 8px; font-size: 28px; line-height: 1.25; }
    .subtitle { margin: 0 0 24px; color: var(--muted); line-height: 1.6; }
    .layout { display: grid; grid-template-columns: 360px 1fr; gap: 20px; align-items: start; }
    section { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px; }
    label { display: block; margin: 0 0 6px; font-size: 13px; color: var(--muted); }
    input { width: 100%; height: 40px; margin: 0 0 14px; padding: 0 11px; border: 1px solid var(--line); border-radius: 6px; font-size: 14px; }
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
    button { height: 42px; border: 0; border-radius: 6px; color: #fff; background: var(--primary); font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover:not(:disabled) { background: var(--primary-dark); }
    button:disabled { cursor: not-allowed; opacity: .5; }
    button.stop { background: var(--danger); }
    button.stop:hover:not(:disabled) { background: #a92b26; }
    .status { display: flex; align-items: center; gap: 8px; margin-top: 16px; color: var(--muted); font-size: 14px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #98a2b3; }
    .dot.ok { background: var(--ok); }
    .dot.recording { background: var(--danger); }
    .result-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin-bottom: 14px; }
    .field { min-height: 76px; border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: #fbfcfe; }
    .field strong { display: block; margin-bottom: 8px; font-size: 13px; color: var(--muted); font-weight: 600; }
    .field p { margin: 0; white-space: pre-wrap; overflow-wrap: anywhere; line-height: 1.55; }
    .field.answer { grid-column: 1 / -1; }
    .log { height: 220px; overflow: auto; border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: #101828; color: #d0d5dd; font-family: Consolas, "Courier New", monospace; font-size: 12px; line-height: 1.55; white-space: pre-wrap; }
    .hint { margin-top: 14px; color: var(--muted); font-size: 13px; line-height: 1.6; }
    @media (max-width: 820px) { main { width: min(100% - 20px, 1040px); padding: 20px 0; } .layout { grid-template-columns: 1fr; } .result-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <h1>实时语音测试</h1>
    <p class="subtitle">点击开始后对着麦克风说话，结束后页面会生成 16k WAV，后端进行 ASR 识别，并把文本交给智能路由和 Agent 回复。</p>

    <div class="layout">
      <section>
        <label for="conversationId">conversationId</label>
        <input id="conversationId" value="c-voice-web-1" autocomplete="off">
        <label for="userId">userId</label>
        <input id="userId" value="u-1" autocomplete="off">
        <label for="voiceSessionId">voiceSessionId</label>
        <input id="voiceSessionId" autocomplete="off">
        <div class="buttons">
          <button id="startButton">开始说话</button>
          <button id="stopButton" class="stop" disabled>结束说话</button>
        </div>
        <div class="status">
          <span id="statusDot" class="dot"></span>
          <span id="statusText">未连接</span>
        </div>
        <p class="hint">页面会连接 <code>ws://localhost:8080/api/voice/realtime</code>。当前页面录完后生成 16k 单声道 WAV，一次发送给后端，适合先打通腾讯一句话 ASR。</p>
      </section>

      <section>
        <div class="result-grid">
          <div class="field"><strong>ASR 识别结果</strong><p id="transcript">等待识别</p></div>
          <div class="field"><strong>targetAgent</strong><p id="targetAgent">等待路由</p></div>
          <div class="field answer"><strong>Agent 回复</strong><p id="answer">等待回复</p></div>
        </div>
        <div id="log" class="log"></div>
      </section>
    </div>
  </main>

  <script>
    const TARGET_SAMPLE_RATE = 16000;
    const startButton = document.getElementById("startButton");
    const stopButton = document.getElementById("stopButton");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const transcript = document.getElementById("transcript");
    const targetAgent = document.getElementById("targetAgent");
    const answer = document.getElementById("answer");
    const log = document.getElementById("log");
    const voiceSessionIdInput = document.getElementById("voiceSessionId");

    let socket;
    let stream;
    let audioContext;
    let sourceNode;
    let processorNode;
    let muteNode;
    let recordedBuffers = [];
    let recording = false;
    let stopping = false;
    let currentTraceId = "";

    voiceSessionIdInput.value = createVoiceSessionId();
    startButton.addEventListener("click", startRecording);
    stopButton.addEventListener("click", stopRecording);

    async function startRecording() {
      resetResult();
      startButton.disabled = true;
      currentTraceId = createTraceId();
      stopping = false;

      try {
        socket = await openSocket(buildWebSocketUrl());
        sendJson({
          type: "start",
          voiceSessionId: valueOf("voiceSessionId"),
          conversationId: valueOf("conversationId"),
          userId: valueOf("userId"),
          audioFormat: "wav",
          sampleRate: TARGET_SAMPLE_RATE,
          traceId: currentTraceId
        });

        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        audioContext = new AudioContextClass();
        sourceNode = audioContext.createMediaStreamSource(stream);
        processorNode = audioContext.createScriptProcessor(4096, 1, 1);
        muteNode = audioContext.createGain();
        muteNode.gain.value = 0;
        processorNode.onaudioprocess = event => {
          if (!recording) {
            return;
          }
          const input = event.inputBuffer.getChannelData(0);
          recordedBuffers.push(new Float32Array(input));
        };
        sourceNode.connect(processorNode);
        processorNode.connect(muteNode);
        muteNode.connect(audioContext.destination);

        recording = true;
        stopButton.disabled = false;
        setStatus("录音中", "recording");
        writeLog("recording started, sourceSampleRate=" + audioContext.sampleRate + ", targetSampleRate=" + TARGET_SAMPLE_RATE);
      } catch (error) {
        writeLog("start failed: " + error.message);
        setStatus("启动失败", "");
        cleanup();
      }
    }

    async function stopRecording() {
      if (!recording) {
        return;
      }
      stopping = true;
      recording = false;
      stopButton.disabled = true;
      setStatus("正在生成 WAV", "ok");

      try {
        const sourceSampleRate = audioContext.sampleRate;
        stopMediaTracks();
        disconnectAudioNodes();
        const wavBlob = createWavBlob(recordedBuffers, sourceSampleRate, TARGET_SAMPLE_RATE);
        writeLog("created wav: " + wavBlob.size + " bytes");
        setStatus("正在发送音频", "ok");
        const base64 = await blobToBase64(wavBlob);
        sendJson({ type: "audio", audioBase64: base64 });
        sendJson({ type: "end" });
        setStatus("已发送结束，等待识别和回复", "ok");
      } catch (error) {
        writeLog("stop failed: " + error.message);
        setStatus("结束失败", "");
        cleanup();
      }
    }

    function openSocket(url) {
      return new Promise((resolve, reject) => {
        const ws = new WebSocket(url);
        ws.addEventListener("open", () => resolve(ws), { once: true });
        ws.addEventListener("error", () => reject(new Error("WebSocket 连接失败")), { once: true });
        ws.addEventListener("message", handleMessage);
        ws.addEventListener("close", event => {
          writeLog("closed: code=" + event.code + " reason=" + (event.reason || "none"));
          if (!stopping) {
            setStatus("连接已关闭：" + event.code, "");
          }
          startButton.disabled = false;
          stopButton.disabled = true;
        });
      });
    }

    function handleMessage(event) {
      writeLog("received: " + event.data);
      let message;
      try {
        message = JSON.parse(event.data);
      } catch (error) {
        writeLog("invalid json: " + error.message);
        return;
      }
      if (message.type === "started") {
        setStatus("server session started", "ok");
      }
      if (message.type === "asr_final") {
        transcript.textContent = message.transcript || "no transcript";
        setStatus("ASR done, waiting for agent", "ok");
      }
      if (message.type === "chat_start") {
        targetAgent.textContent = message.targetAgent || "routing";
        answer.textContent = "";
        setStatus("agent responding", "ok");
      }
      if (message.type === "chat_delta") {
        answer.textContent += message.delta || "";
      }
      if (message.type === "chat_done") {
        targetAgent.textContent = message.targetAgent || targetAgent.textContent || "unknown";
        setStatus("done", "ok");
      }
      if (message.type === "chat_response") {
        targetAgent.textContent = message.targetAgent || "unknown";
        answer.textContent = message.answer || answer.textContent || "no answer";
        setStatus("done", "ok");
        closeSocketLater();
      }
      if (message.type === "error") {
        setStatus("server error", "");
        answer.textContent = message.message || "server processing failed";
        closeSocketLater();
      }
    }
    function sendJson(payload) {
      socket.send(JSON.stringify(payload));
      if (payload.type === "audio") {
        writeLog("sent: audio wav base64 chars=" + payload.audioBase64.length);
      } else {
        writeLog("sent: " + JSON.stringify(payload));
      }
    }

    function createWavBlob(buffers, sourceSampleRate, targetSampleRate) {
      const samples = mergeBuffers(buffers);
      if (samples.length === 0) {
        throw new Error("没有录到音频");
      }
      const resampled = resampleLinear(samples, sourceSampleRate, targetSampleRate);
      const wavBuffer = encodeWav16BitMono(resampled, targetSampleRate);
      return new Blob([wavBuffer], { type: "audio/wav" });
    }

    function mergeBuffers(buffers) {
      const length = buffers.reduce((sum, buffer) => sum + buffer.length, 0);
      const result = new Float32Array(length);
      let offset = 0;
      for (const buffer of buffers) {
        result.set(buffer, offset);
        offset += buffer.length;
      }
      return result;
    }

    function resampleLinear(samples, sourceSampleRate, targetSampleRate) {
      if (sourceSampleRate === targetSampleRate) {
        return samples;
      }
      const ratio = sourceSampleRate / targetSampleRate;
      const newLength = Math.round(samples.length / ratio);
      const result = new Float32Array(newLength);
      for (let i = 0; i < newLength; i++) {
        const position = i * ratio;
        const leftIndex = Math.floor(position);
        const rightIndex = Math.min(leftIndex + 1, samples.length - 1);
        const fraction = position - leftIndex;
        result[i] = samples[leftIndex] + (samples[rightIndex] - samples[leftIndex]) * fraction;
      }
      return result;
    }

    function encodeWav16BitMono(samples, sampleRate) {
      const bytesPerSample = 2;
      const headerBytes = 44;
      const buffer = new ArrayBuffer(headerBytes + samples.length * bytesPerSample);
      const view = new DataView(buffer);
      writeAscii(view, 0, "RIFF");
      view.setUint32(4, 36 + samples.length * bytesPerSample, true);
      writeAscii(view, 8, "WAVE");
      writeAscii(view, 12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * bytesPerSample, true);
      view.setUint16(32, bytesPerSample, true);
      view.setUint16(34, 16, true);
      writeAscii(view, 36, "data");
      view.setUint32(40, samples.length * bytesPerSample, true);
      let offset = headerBytes;
      for (const sample of samples) {
        const clamped = Math.max(-1, Math.min(1, sample));
        view.setInt16(offset, clamped < 0 ? clamped * 0x8000 : clamped * 0x7fff, true);
        offset += bytesPerSample;
      }
      return buffer;
    }

    function writeAscii(view, offset, text) {
      for (let i = 0; i < text.length; i++) {
        view.setUint8(offset + i, text.charCodeAt(i));
      }
    }

    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(String(reader.result).split(",")[1]);
        reader.onerror = () => reject(new Error("音频读取失败"));
        reader.readAsDataURL(blob);
      });
    }

    function buildWebSocketUrl() {
      const scheme = location.protocol === "https:" ? "wss" : "ws";
      return scheme + "://" + location.host + "/api/voice/realtime";
    }

    function valueOf(id) { return document.getElementById(id).value.trim(); }

    function setStatus(text, mode) {
      statusText.textContent = text;
      statusDot.className = "dot" + (mode ? " " + mode : "");
    }

    function writeLog(line) {
      const time = new Date().toLocaleTimeString();
      log.textContent += "[" + time + "] " + line + "\n";
      log.scrollTop = log.scrollHeight;
    }

    function resetResult() {
      transcript.textContent = "等待识别";
      targetAgent.textContent = "等待路由";
      answer.textContent = "等待回复";
      log.textContent = "";
      recordedBuffers = [];
      if (!valueOf("voiceSessionId")) {
        voiceSessionIdInput.value = createVoiceSessionId();
      }
    }

    function createVoiceSessionId() { return "v-web-" + Date.now(); }

    function createTraceId() { return "trace-web-" + Date.now(); }

    function closeSocketLater() {
      setTimeout(() => {
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.close(1000, "done");
        }
        cleanup();
      }, 300);
    }

    function cleanup() {
      recording = false;
      startButton.disabled = false;
      stopButton.disabled = true;
      stopMediaTracks();
      disconnectAudioNodes();
      socket = undefined;
    }

    function stopMediaTracks() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = undefined;
      }
    }

    function disconnectAudioNodes() {
      if (processorNode) {
        processorNode.disconnect();
        processorNode.onaudioprocess = null;
        processorNode = undefined;
      }
      if (sourceNode) {
        sourceNode.disconnect();
        sourceNode = undefined;
      }
      if (muteNode) {
        muteNode.disconnect();
        muteNode = undefined;
      }
      if (audioContext && audioContext.state !== "closed") {
        audioContext.close();
      }
      audioContext = undefined;
    }
  </script>
</body>
</html>
